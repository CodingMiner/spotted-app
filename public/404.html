<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Spotted</title>
    <script>
      // Redirect all GitHub Pages 404s back to index.html with the path encoded
      // in the query string so the SPA can restore it after load.
      var pathSegmentsToKeep = 1; // keeps /spotted-app
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
